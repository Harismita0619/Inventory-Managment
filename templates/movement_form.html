{% extends 'base.html' %}
{% block title %}{{ action }} Movement — Inventory Manager{% endblock %}
{% block content %}
<div class="page-header">
  <h1><span class="label">{{ action }}</span>Product Movement</h1>
  <a href="{{ url_for('movements') }}" class="btn btn-outline">← Back</a>
</div>

<div class="card form-card" style="padding:1.8rem">
  <form method="POST">
    <div class="form-group">
      <label for="movement_id">Movement ID</label>
      <input type="text" id="movement_id" name="movement_id"
             value="{{ movement.movement_id if movement else '' }}"
             placeholder="e.g. MOV-001"
             {% if action == 'Edit' %}readonly{% endif %}
             required />
    </div>

    <div class="form-group">
      <label for="product_id">Product</label>
      <select id="product_id" name="product_id" required>
        <option value="">— Select a Product —</option>
        {% for p in products %}
        <option value="{{ p.product_id }}"
          {% if movement and movement.product_id == p.product_id %}selected{% endif %}>
          {{ p.product_id }}
        </option>
        {% endfor %}
      </select>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
      <div class="form-group">
        <label for="from_location">From Location</label>
        <select id="from_location" name="from_location">
          <option value="">— None (inbound) —</option>
          {% for l in locations %}
          <option value="{{ l.location_id }}"
            {% if movement and movement.from_location == l.location_id %}selected{% endif %}>
            {{ l.location_id }}
          </option>
          {% endfor %}
        </select>
        <p class="form-hint">Leave blank to receive into a location.</p>
      </div>

      <div class="form-group">
        <label for="to_location">To Location</label>
        <select id="to_location" name="to_location">
          <option value="">— None (outbound) —</option>
          {% for l in locations %}
          <option value="{{ l.location_id }}"
            {% if movement and movement.to_location == l.location_id %}selected{% endif %}>
            {{ l.location_id }}
          </option>
          {% endfor %}
        </select>
        <p class="form-hint">Leave blank to dispatch from a location.</p>
      </div>
    </div>

    <div class="form-group">
      <label for="qty">Quantity</label>
      <input type="number" id="qty" name="qty" min="1"
             value="{{ movement.qty if movement else '' }}"
             placeholder="e.g. 25" required />
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-success">{{ '💾 Save Changes' if action == 'Edit' else '+ Record Movement' }}</button>
      <a href="{{ url_for('movements') }}" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
